<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chaos Game 😈</title>

<style>
body {
  font-family: 'Comic Sans MS', cursive;
  background: linear-gradient(135deg, #0f0f1a, #2d1b69);
  text-align: center;
  height: 100vh;
  overflow: hidden;
  color: white;
}

.box {
  background: #fff;
  padding: 35px;
  border-radius: 35px;
  width: 3400px;
  margin: 900px auto;
  box-shadow: 0 0 300px rgba(0,0,0,0.7);
  position: relative;
}

button {
  padding: 100px 200px;
  margin: 100px;
  border: none;
  border-radius: 100px;
  font-size: 160px;
  cursor: pointer;
}

#yes {
  background: #00c896;
}

#no {
  background: #ff4d6d;
  position: absolute;
}

#reaction {
  margin-top: 40px;
  font-style: italic;
}
</style>
</head>

<body>

<div class="box">
  <h2 id="question">Loading...</h2>
  <button id="yes">Yes 😌</button>
  <button id="no">No 😏</button>
  <p id="reaction"></p>
</div>

<script>

const quiz = [
  {
    q: "You reply late but are online all day?",
    yes: "You saw the message… you just didn’t reply 😭",
    no: "Be honest… notifications exist for a reason 💀"
  },
  {
    q: "You see messages and still ignore sometimes?",
    yes: "That ‘I’ll reply later’ never happens 😏",
    no: "So you’re telling me you reply instantly? 👀"
  },
  {
    q: "You say 'busy' but scroll reels?",
    yes: "Hmm productivity king?💀",
    no: "Busy… but not too busy for reels 😭"
  },
  {
    q: "Do You lowkey care about me?",
    yes: "That small hope is doing a lot huh 💭",
    no: "Or maybe you’re just protecting your heart 👀"
  },
  {
    q: "Do You notice small things about me?",
    yes: "Those little moments stay longer than they should 💔",
    no: "Or maybe he notices… but you pretend he doesn’t 😏"
  },
  {
    q: "Do You like talking to me but hide it?",
    yes: "Mixed signals got you thinking twice 😭",
    no: "Or maybe you don’t want to assume too much 👀"
  },
  {
    q: "Do You get a little jealous sometimes?",
    yes: "Or are you just really good at hiding it 💀",
    no: "Jealousy speaks louder than words sometimes 😌"
  },
  {
    q: "You act chill but actually care a lot?",
    yes: "Teach us your power then 💅",
    no: "Calm outside… chaos inside 😭"
  },
  {
    q: "You overthink my replies?",
    yes: "One text = 10 different meanings 😭",
    no: "So you just read and move on? impossible 💀"
  },
  {
    q: "You wait for my message sometimes?",
    yes: "That one notification matters more than others 💔",
    no: "Or you just don’t admit it 👀"
  },
  {
    q: "You think something could happen between us?",
    yes: "It’s giving ‘almost something’ energy 😭",
    no: "Or maybe you’re scared to believe it 😏"
  },
  {
    q: "You feel this story isn't over yet?",
    yes: "Some stories don’t end… they pause 💭",
    no: "Or you’re trying to force yourself to move on 💀"
  },
  {
    q: "You believe timing is the only problem?",
    yes: "Right person, wrong time hits different ⏳",
    no: "Or maybe timing isn’t the only issue 👀"
  },
  {
    q: "You think you'll realize my value one day?",
    yes: "One day… but why not now? 💔",
    no: "Maybe you’re learning to choose yourself instead 👑"
  }
];

const endings = [
  " feels something… but confusion wins 💭",
  "It’s unfinished, not over ⏳",
  "You matter more than you realize 💖",
  "This story has potential… but no clarity yet 👀",
  "Slow burn or slow pain… hard to tell 🔥",
  "You deserve consistency, not confusion 👑"
];

let current = 0;

function loadQuestion() {
  document.getElementById("question").innerText = quiz[current].q;
  document.getElementById("reaction").innerText = "";
}

// YES
document.getElementById("yes").onclick = () => {
  document.getElementById("reaction").innerText = quiz[current].yes;
  nextQuestion();
};

// NO runs away 😈
document.getElementById("no").onmouseover = () => {
  let x = Math.random() * 280;
  let y = Math.random() * 220;

  let noBtn = document.getElementById("no");
  noBtn.style.left = x + "px";
  noBtn.style.top = y + "px";
};

// If NO somehow clicked
document.getElementById("no").onclick = () => {
  document.getElementById("reaction").innerText = quiz[current].no;
};

// NEXT
function nextQuestion() {
  current++;

  if (current < quiz.length) {
    setTimeout(loadQuestion, 2000);
  } else {
    showEnding();
  }
}

// FINAL RESULT
function showEnding() {
  let final = endings[Math.floor(Math.random() * endings.length)];

  document.querySelector(".box").innerHTML =
    `<h2>Analysis Complete 😈</h2>
     <p>${final}</p>
     <p style="font-size:45px;opacity:0.7;">(Now go overthink peacefully 💀)</p>
     <button onclick="location.reload()">Play Again 🔄</button>`;
}

loadQuestion();

</script>

</body>
</html>
